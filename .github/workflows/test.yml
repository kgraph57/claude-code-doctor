name: test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Validate sample JSON
        run: |
          python -m json.tool samples/dashboard.json >/dev/null
          python -m json.tool samples/share-cards.json >/dev/null

      - name: Render dashboard fixture
        run: python scripts/build_dashboard.py samples/dashboard.json /tmp/claude-code-doctor-dashboard.html
