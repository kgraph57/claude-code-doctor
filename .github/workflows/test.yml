name: test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Validate sample JSON
        run: |
          python -m json.tool samples/dashboard.json >/dev/null
          python -m json.tool samples/share-cards.json >/dev/null
          python -m json.tool samples/diff-before.json >/dev/null
          python -m json.tool samples/diff-after.json >/dev/null
          python -m json.tool samples/budgets.json >/dev/null

      - name: Render dashboard fixture
        run: python scripts/build_dashboard.py samples/dashboard.json /tmp/claude-code-doctor-dashboard.html

      - name: Compare diff fixtures
        run: python scripts/compare_reports.py samples/diff-before.json samples/diff-after.json /tmp/claude-code-doctor-diff.md

      - name: Check budget fixture
        run: python scripts/check_budgets.py samples/diff-before.json samples/budgets.json /tmp/claude-code-doctor-budget.md

      - name: Validate domain packs
        run: python scripts/validate_domain_pack.py domain-packs/*.md

      - name: Validate adapter notes
        run: python scripts/validate_adapter_notes.py docs/adapters/*.md

      - name: Build Windows probe plan
        run: python scripts/build_windows_probe_plan.py /tmp/claude-code-doctor-windows.md

      - name: Build Linux probe plan
        run: python scripts/build_linux_probe_plan.py /tmp/claude-code-doctor-linux.md

      - name: Build walkthrough
        run: python scripts/build_walkthrough.py docs/generated-demo
